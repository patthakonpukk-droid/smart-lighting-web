<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Light Web</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #34495e; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 320px; }
        
        /* สไตล์สำหรับช่องกรอกรหัสผ่าน */
        .login-input { padding: 12px; width: 90%; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 16px; text-align: center; box-sizing: border-box; }
        
        .status-box { margin: 15px 0; font-size: 24px; font-weight: bold; padding: 20px; border-radius: 10px; background: #2c3e50; transition: 0.3s; }
        .on { color: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        .off { color: #e74c3c; }
        
        .sensor-box { background: #2c3e50; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 16px; border: 1px solid #7f8c8d; }
        .sensor-item { margin-bottom: 8px; }
        
        button { padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; color: white; transition: 0.3s;}
        
        #light-btn { background-color: #3498db; }
        #light-btn:hover:not(:disabled) { background-color: #2980b9; }
        #light-btn:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.6; }
        
        #mode-btn { background-color: #9b59b6; }
        #mode-btn.auto-mode { background-color: #e67e22; }

        /* ปุ่มหน้าล็อกอิน */
        .login-btn { background-color: #2ecc71; }
        .login-btn:hover { background-color: #27ae60; }
        .logout-btn { background-color: #e74c3c; padding: 10px; font-size: 14px; margin-top: 15px; }
        .logout-btn:hover { background-color: #c0392b; }
        
        #loading { font-size: 14px; color: #bdc3c7; margin-top: 10px; }
        
        /* คลาสสำหรับซ่อนหน้าต่าง */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ================= ส่วนที่ 1: หน้าล็อกอิน ================= -->
    <div class="card" id="login-section">
        <h2>🔒 ใส่รหัสผ่าน</h2>
        <input type="password" id="password-input" class="login-input" placeholder="กรอกรหัสผ่านที่นี่...">
        <button class="login-btn" onclick="checkPassword()">เข้าสู่ระบบ</button>
        <p id="login-error" style="color: #e74c3c; display: none; font-size: 14px; margin-top: 10px;">รหัสผ่านไม่ถูกต้อง!</p>
    </div>

    <!-- ================= ส่วนที่ 2: หน้าควบคุมหลัก ================= -->
    <div class="card hidden" id="main-section">
        <h2>ระบบไฟบ้านอัจฉริยะ</h2>
        
        <div class="sensor-box">
            <div class="sensor-item">🚶‍♂️ คนเดินผ่าน: <span id="pir-val" style="font-weight: bold; color: #f1c40f;">รอข้อมูล...</span></div>
            <div class="sensor-item">สภาพแสง: <span id="ldr-val" style="font-weight: bold; color: #f1c40f;">รอข้อมูล...</span></div>
        </div>

        <div class="status-box" id="status-display">กำลังโหลด...</div>
        
        <button id="mode-btn" onclick="toggleMode()">โหมด: Manual</button>
        <button id="light-btn" onclick="toggleLight()">สลับสถานะไฟ</button>
        
        <div id="loading">เชื่อมต่อฐานข้อมูล...</div>

        <!-- ปุ่มออกจากระบบ -->
        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </div>

    <script>
        // 🛑 ตั้งรหัสผ่านของคุณตรงนี้ครับ 🛑
        const MY_PASSWORD = "Smartlig"; 
        
        // ==========================================
        const supabaseKey = 'sb_publishable_s-ez7O56MdfciUpaJ6Q-uQ_X8ewzGD8';
        const supabaseUrl = 'https://phioecfmmazjkiqypgjg.supabase.co'; 
        // ==========================================
        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentStatus = false;
        let currentMode = false;
        const deviceId = 1; 

        const statusDisplay = document.getElementById('status-display');
        const loadingText = document.getElementById('loading');
        const lightBtn = document.getElementById('light-btn');
        const modeBtn = document.getElementById('mode-btn');

        // ตรวจสอบสถานะการล็อกอินตอนเปิดหน้าเว็บ
        window.onload = () => {
            const isLoggedIn = sessionStorage.getItem("isLoggedIn");
            if (isLoggedIn === "true") {
                showMainUI();
            }
        };

        function checkPassword() {
            const inputVal = document.getElementById('password-input').value;
            if (inputVal === MY_PASSWORD) {
                sessionStorage.setItem("isLoggedIn", "true"); 
                showMainUI();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem("isLoggedIn"); 
            location.reload(); 
        }

        function showMainUI() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            
            fetchLight();
            
            supabaseClient.channel('public:devices')
              .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'devices' }, payload => {
                  updateUI(payload.new.status, payload.new.mode);
                  updateSensors(payload.new.motion_detected, payload.new.light_level);
              })
              .subscribe();
        }

        async function fetchLight() {
            loadingText.innerText = "กำลังดึงข้อมูล...";
            const { data, error } = await supabaseClient.from('devices').select('*').eq('id', deviceId).single();
            if (data) {
                updateUI(data.status, data.mode);
                updateSensors(data.motion_detected, data.light_level);
                loadingText.innerText = "ซิงค์ข้อมูลสำเร็จ";
            } else {
                loadingText.innerText = "ไม่พบข้อมูล กรุณาเช็คตารางใน Supabase";
            }
        }

        async function toggleLight() {
            if (currentMode) return; 
            loadingText.innerText = "กำลังส่งคำสั่งไฟ...";
            const newStatus = !currentStatus; 
            const { error } = await supabaseClient.from('devices').update({ status: newStatus }).eq('id', deviceId);
            if (error) loadingText.innerText = "Error: " + error.message;
            else loadingText.innerText = "ส่งคำสั่งไฟสำเร็จ";
        }

        async function toggleMode() {
            loadingText.innerText = "กำลังเปลี่ยนโหมด...";
            const newMode = !currentMode; 
            const { error } = await supabaseClient.from('devices').update({ mode: newMode }).eq('id', deviceId);
            if (error) loadingText.innerText = "Error: " + error.message;
            else loadingText.innerText = "เปลี่ยนโหมดสำเร็จ";
        }

        function updateUI(status, mode) {
            currentStatus = status;
            currentMode = mode;
            
            if (status) {
                statusDisplay.innerHTML = 'ไฟติดสว่าง 💡';
                statusDisplay.className = 'status-box on';
            } else {
                statusDisplay.innerHTML = 'ไฟดับ 🌑';
                statusDisplay.className = 'status-box off';
            }

            if (mode) {
                modeBtn.innerText = "โหมด: Auto (เซ็นเซอร์ทำงาน)";
                modeBtn.className = "auto-mode";
                lightBtn.disabled = true; 
                lightBtn.innerText = "ปิดใช้งานในโหมด Auto";
            } else {
                modeBtn.innerText = "โหมด: Manual (ควบคุมเอง)";
                modeBtn.className = "";
                lightBtn.disabled = false; 
                lightBtn.innerText = "สลับสถานะไฟ";
            }
        }

        // ฟังก์ชันอัปเดตเซ็นเซอร์และแปลค่าแสงเป็นข้อความ
        function updateSensors(motion, light) {
            const pirDisplay = document.getElementById('pir-val');
            if (motion) {
                pirDisplay.innerText = "ตรวจพบ!";
                pirDisplay.style.color = "#e74c3c"; 
            } else {
                pirDisplay.innerText = "ปกติ";
                pirDisplay.style.color = "#2ecc71"; 
            }

            const ldrDisplay = document.getElementById('ldr-val');
            if (light !== null && light !== undefined) {
                let lightText = "";
                let lightColor = "";

                // เช็คช่วงค่าแสงและเปลี่ยนเป็นข้อความ
                if (light < 1000) {
                    lightText = "☀️ สว่างมาก (" + light + ")";
                    lightColor = "#f1c40f"; 
                } else if (light < 3000) {
                    lightText = "⛅ แสงสลัว (" + light + ")";
                    lightColor = "#e67e22"; 
                } else {
                    lightText = "🌙 มืดสนิท (" + light + ")";
                    lightColor = "#bdc3c7"; 
                }

                ldrDisplay.innerText = lightText;
                ldrDisplay.style.color = lightColor;
            } else {
                ldrDisplay.innerText = "ไม่มีข้อมูล";
                ldrDisplay.style.color = "#ecf0f1";
            }
        }
    </script>
</body>
</html>
